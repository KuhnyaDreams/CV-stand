core:
  url: "http://localhost:8000"
  timeout: 30
  timeout_folder: 60

output:
  results_dir: "results/attack_results"
  singles_dir: "results/singles"

classes:
  - "person"
  - "cell phone"

white_box_attacks:
  fgsm:
    enabled: true
    epsilon: 0.03
    
  pgd:
    enabled: true
    epsilon: 0.03
    num_steps: 7
    
  deepfool:
    enabled: true
    num_classes: 80
    
  jsma:
    enabled: true
    theta: 1.0
    gamma: 0.1

black_box_attacks:
  single_pixel:
    enabled: true
    num_modifications: 1
    
  random_noise:
    enabled: true
    noise_level: 0.1
    
  gaussian_blur:
    enabled: true
    kernel_size: 5
    
  patch:
    enabled: true
    patch_size: 32
    patch_color: [255, 0, 0]
    
  brightness:
    enabled: true
    factor: 0.5
    
  contrast:
    enabled: true
    factor: 0.5
    
  rotation:
    enabled: true
    angle: 15.0
    
  perspective:
    enabled: true
    strength: 20

parametric_scan:
  fgsm:
    enabled: false
    epsilons: [0.01, 0.05, 0.1, 0.2]
