services:
  core:
    build: ./core
    container_name: yolo26-core
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./results:/app/results
      - ./core:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - cv-network

  jupyter:
    image: jupyter/base-notebook:latest
    container_name: yolo26-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./data:/home/jovyan/data
      - ./results:/home/jovyan/results
      - ./wrapper/scripts:/home/jovyan/scripts
    environment:
      - CORE_URL=http://core:8000
    depends_on:
      - core
    networks:
      - cv-network
    command: start-notebook.sh --NotebookApp.token=''

networks:
  cv-network:
    driver: bridge